<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel - MyFriendHub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:Arial; }
    body { background:#f5f5f5; padding:20px; }
    .header { background:#4285f4; color:white; padding:15px; border-radius:8px; margin-bottom:20px; display:flex; justify-content:space-between; align-items:center; }
    .tabs { display:flex; gap:10px; margin-bottom:20px; }
    .tab { padding:10px 20px; background:white; border:none; border-radius:4px; cursor:pointer; font-weight:bold; }
    .tab.active { background:#4285f4; color:white; }
    .section { display:none; }
    .section.active { display:block; }
    .card { background:white; padding:15px; border-radius:8px; margin:10px 0; box-shadow:0 2px 5px rgba(0,0,0,0.1); }
    .status { padding:3px 8px; border-radius:4px; font-size:12px; font-weight:bold; }
    .pending { background:#ff9800; color:white; }
    .confirmed { background:#4caf50; color:white; }
    .cancelled { background:#f44336; color:white; }
    button { padding:8px 15px; border:none; border-radius:4px; cursor:pointer; margin:5px 5px 0 0; }
    .confirm-btn { background:#4caf50; color:white; }
    .cancel-btn { background:#f44336; color:white; }
    .delete-btn { background:#666; color:white; }
    .add-btn { background:#4285f4; color:white; }
    input, select { width:100%; padding:10px; margin:5px 0; border:1px solid #ddd; border-radius:4px; }
    .form-group { margin:15px 0; }
    label { font-weight:bold; display:block; margin-bottom:5px; }
    #loginPanel { text-align:center; margin-top:100px; }
    .login-btn { background:#db4437; color:white; padding:12px 30px; font-size:16px; }
    .grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  </style>
</head>
<body>
  <div id="loginPanel">
    <h2>Admin Login</h2>
    <button class="login-btn" onclick="login()">Login with Google</button>
    <p id="loginError" style="color:red;margin-top:10px"></p>
  </div>

  <div id="adminPanel" style="display:none">
    <div class="header">
      <h2>MyFriendHub - Admin Panel</h2>
      <div>
        <span id="adminEmail"></span>
        <button onclick="logout()" style="background:white;color:#4285f4">Logout</button>
      </div>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="showTab('bookings', event)">📋 Bookings</button>
      <button class="tab" onclick="showTab('cars', event)">🚗 Cars</button>
      <button class="tab" onclick="showTab('drops', event)">📍 Drop Locations</button>
    </div>

    <div id="bookings" class="section active">
      <h3>All Bookings</h3>
      <div id="bookingsList"></div>
    </div>

    <div id="cars" class="section">
      <h3>Car Management</h3>
      <div class="card">
        <h4>Add New Car</h4>
        <div class="grid">
          <div class="form-group"><label>Car Name</label><input id="carName" placeholder="Toyota Innova"></div>
          <div class="form-group"><label>Car Number</label><input id="carNumber" placeholder="WB-01-1234"></div>
          <div class="form-group"><label>Driver Name</label><input id="driverName" placeholder="Rahul Sharma"></div>
          <div class="form-group"><label>Driver Phone</label><input id="driverPhone" placeholder="+91 9876543210"></div>
          <div class="form-group"><label>Price per KM (₹)</label><input id="carPrice" type="number" placeholder="15"></div>
          <div class="form-group"><label>Quantity</label><input id="carQuantity" type="number" placeholder="5"></div>
        </div>
        <button class="add-btn" onclick="addCar()">Add Car</button>
      </div>
      <h4>All Cars</h4>
      <div id="carsList"></div>
    </div>

    <div id="drops" class="section">
      <h3>Popular Drop Locations</h3>
      <div class="card">
        <h4>Add Drop Location</h4>
        <div class="form-group"><label>Location Name</label><input id="dropName" placeholder="Durgapur Railway Station"></div>
        <div class="form-group"><label>Address</label><input id="dropAddress" placeholder="Full Address"></div>
        <button class="add-btn" onclick="addDrop()">Add Location</button>
      </div>
      <h4>All Drop Locations</h4>
      <div id="dropsList"></div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBbmHhNYPFLMgeCkMj07YoUdtM2bvD8-9o",
      authDomain: "my-friend-hub.firebaseapp.com",
      databaseURL: "https://my-friend-hub-default-rtdb.firebaseio.com",
      projectId: "my-friend-hub",
      storageBucket: "my-friend-hub.firebasestorage.app",
      messagingSenderId: "1052688727503",
      appId: "1:1052688727503:web:0a39c289e8b17966b4a6ee"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();

    auth.onAuthStateChanged(async user => {
      if (user) {
        const adminSnap = await db.ref('admins/' + user.uid).once('value');
        if (adminSnap.exists()) {
          document.getElementById('loginPanel').style.display = 'none';
          document.getElementById('adminPanel').style.display = 'block';
          document.getElementById('adminEmail').innerText = user.email;
          loadBookings(); loadCars(); loadDrops();
        } else {
          document.getElementById('loginError').innerText = 'Access Denied. Admin only.';
          auth.signOut();
        }
      } else {
        document.getElementById('loginPanel').style.display = 'block';
        document.getElementById('adminPanel').style.display = 'none';
      }
    });

    function login() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
    function logout() { auth.signOut(); }

    function showTab(tabName, event) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      event.target.classList.add('active');
      document.getElementById(tabName).classList.add('active');
    }

    function loadBookings() {
      db.ref("bookings").orderByChild("timestamp").on('value', (snap) => {
        const div = document.getElementById("bookingsList");
        div.innerHTML = "";
        if (!snap.exists()) { div.innerHTML = "<p>No bookings yet</p>"; return; }
        const bookings = [];
        snap.forEach(child => bookings.push({id: child.key, ...child.val()}));
        bookings.reverse().forEach(d => {
          const date = new Date(d.timestamp).toLocaleString();
          div.innerHTML += `
            <div class="card">
              <span class="status ${d.status}">${d.status.toUpperCase()}</span>
              <p><b>User:</b> ${d.userName} (${d.userEmail})</p>
              <p><b>Phone:</b> ${d.userPhone}</p>
              <p><b>Car:</b> ${d.carName} - Driver: ${d.driverName} (${d.driverPhone})</p>
              <p><b>Pickup:</b> ${d.pickup.address}</p>
              <p><b>Drop:</b> ${d.drop.address}</p>
              <p><b>Price:</b> ₹${d.price}/km</p>
              <p><b>Time:</b> ${date}</p>
              ${d.status === 'pending' ? `<button class="confirm-btn" onclick="updateStatus('${d.id}', 'confirmed')">Confirm</button><button class="cancel-btn" onclick="updateStatus('${d.id}', 'cancelled')">Cancel</button>` : ''}
              <button class="delete-btn" onclick="deleteBooking('${d.id}')">Delete</button>
            </div>`;
        });
      });
    }

    function updateStatus(id, status) { db.ref("bookings/" + id + "/status").set(status); }
    function deleteBooking(id) { if (confirm('Delete this booking?')) db.ref("bookings/" + id).remove(); }

    async function addCar() {
      const car = {
        name: document.getElementById('carName').value,
        number: document.getElementById('carNumber').value,
        driverName: document.getElementById('driverName').value,
        driverPhone: document.getElementById('driverPhone').value,
        price: parseFloat(document.getElementById('carPrice').value),
        quantity: parseInt(document.getElementById('carQuantity').value),
        createdAt: firebase.database.ServerValue.TIMESTAMP
      };
      if (!car.name || !car.number || !car.driverName || !car.driverPhone || !car.price || !car.quantity) return alert('সব Field Fill কর');
      await db.ref('cars').push(car);
      alert('Car Added Successfully!');
      document.getElementById('carName').value = ''; document.getElementById('carNumber').value = '';
      document.getElementById('driverName').value = ''; document.getElementById('driverPhone').value = '';
      document.getElementById('carPrice').value = ''; document.getElementById('carQuantity').value = '';
    }

    function loadCars() {
      db.ref("cars").orderByChild("createdAt").on('value', (snap) => {
        const div = document.getElementById("carsList");
        div.innerHTML = "";
        if (!snap.exists()) { div.innerHTML = "<p>No cars added yet</p>"; return; }
        const cars = [];
        snap.forEach(child => cars.push({id: child.key, ...child.val()}));
        cars.reverse().forEach(c => {
          div.innerHTML += `
            <div class="card">
              <h4>${c.name} (${c.number})</h4>
              <p><b>Driver:</b> ${c.driverName} - ${c.driverPhone}</p>
              <p><b>Price:</b> ₹${c.price}/km</p>
              <p><b>Available:</b> ${c.quantity} cars</p>
              <button class="delete-btn" onclick="deleteCar('${c.id}')">Delete Car</button>
            </div>`;
        });
      });
    }

    function deleteCar(id) { if (confirm('Delete this car?')) db.ref("cars/" + id).remove(); }

    async function addDrop() {
      const drop = {
        name: document.getElementById('dropName').value,
        address: document.getElementById('dropAddress').value,
        createdAt: firebase.database.ServerValue.TIMESTAMP
      };
      if (!drop.name || !drop.address) return alert('সব Field Fill কর');
      await db.ref('drops').push(drop);
      alert('Drop Location Added!');
      document.getElementById('dropName').value = ''; document.getElementById('dropAddress').value = '';
    }

    function loadDrops() {
      db.ref("drops").orderByChild("createdAt").on('value', (snap) => {
        const div = document.getElementById("dropsList");
        div.innerHTML = "";
        if (!snap.exists()) { div.innerHTML = "<p>No drop locations added yet</p>"; return; }
        const drops = [];
        snap.forEach(child => drops.push({id: child.key, ...child.val()}));
        drops.reverse().forEach(d => {
          div.innerHTML += `<div class="card"><h4>${d.name}</h4><p>${d.address}</p><button class="delete-btn" onclick="deleteDrop('${d.id}')">Delete</button></div>`;
        });
      });
    }

    function deleteDrop(id) { if (confirm('Delete this location?')) db.ref("drops/" + id).remove(); }
  </script>
</body>
</html>
