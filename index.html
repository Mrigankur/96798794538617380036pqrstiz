<!DOCTYPE html>
<html>
<head>
  <title>QuickRide Admin Panel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      color: white; min-height: 100vh;
    }

    /* Login Box */
    .loginBox { 
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.95); display: flex; justify-content: center; align-items: center; z-index: 99999;
    }
    .loginCard {
      background: linear-gradient(135deg, #1e293b, #0f172a); padding: 40px; border-radius: 28px;
      text-align: center; border: 1px solid rgba(16, 163, 127, 0.3); max-width: 400px; width: 90%;
      animation: slideUp 0.4s ease;
    }
    @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .googleBtn { 
      background: white; color: black; width: 100%; padding: 14px; border: none; 
      border-radius: 35px; font-weight: 700; cursor: pointer; margin-top: 20px; font-size: 16px; 
    }

    /* Header */
    .header {
      background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(20px);
      padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; 
      position: sticky; top: 0; z-index: 100;
    }
    .userInfo { display: flex; align-items: center; gap: 10px; }
    .userInfo img { width: 35px; height: 35px; border-radius: 50%; }
    .logoutBtn { background: #ef4444; border: none; padding: 8px 16px; border-radius: 20px; color: white; cursor: pointer; }

    /* Stats Panel (NEW Feature) */
    .statsRow {
      display: flex; gap: 15px; padding: 0 20px; max-width: 1400px; margin: 20px auto 0;
    }
    .statCard {
      background: #1e293b; padding: 15px 25px; border-radius: 12px; border-left: 4px solid #10a37f; min-width: 150px;
    }
    .statCard h5 { color: #94a3b8; font-size: 12px; text-transform: uppercase; }
    .statCard p { font-size: 24px; font-weight: 700; margin-top: 5px; }

    /* Tabs */
    .tabs { display: flex; gap: 10px; padding: 20px; max-width: 1400px; margin: 0 auto; }
    .tabBtn {
      background: #1e293b; border: none; padding: 12px 24px; border-radius: 12px; 
      color: white; cursor: pointer; font-weight: 600; transition: 0.3s;
    }
    .tabBtn.active { background: #10a37f; }
    .tabContent { display: none; padding: 20px; max-width: 1400px; margin: 0 auto; }
    .tabContent.active { display: block; animation: fadeIn 0.4s ease; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    /* Filter & Search Inputs (NEW Feature) */
    .filterSelect, .searchBar {
      padding: 10px 15px; border-radius: 8px; border: none; background: #111827;
      color: white; outline: none; margin-bottom: 15px; width: 100%; max-width: 300px;
    }
    .filterSelect:focus, .searchBar:focus { box-shadow: 0 0 0 2px #10a37f; }

    /* Tables */
    table {
      width: 100%; background: #1e293b; border-radius: 15px; overflow: hidden;
      border-collapse: collapse; margin-top: 5px;
    }
    th, td { padding: 15px; text-align: left; border-bottom: 1px solid #334155; }
    th { background: #0f172a; font-weight: 700; }
    tr:hover { background: #334155; }
    .status { padding: 5px 15px; border-radius: 20px; font-size: 12px; font-weight: 700; }
    .pending { background: #f59e0b; color: black; } 
    .confirmed { background: #10a37f; color: white; } 
    .cancelled { background: #ef4444; color: white; }
    .actionBtn {
      padding: 6px 14px; border: none; border-radius: 8px; cursor: pointer; 
      font-size: 12px; font-weight: 600; margin: 2px;
    }
    .confirmBtn { background: #10a37f; color: white; }
    .cancelBtn { background: #ef4444; color: white; }

    /* Add Car Form */
    .addForm {
      background: #1e293b; padding: 25px; border-radius: 20px; margin-bottom: 20px;
      display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px;
    }
    .addForm input, .addForm select {
      padding: 12px; border-radius: 10px; border: none; background: #111827; 
      color: white; font-size: 14px; outline: none;
    }
    .addForm input:focus { box-shadow: 0 0 0 2px #10a37f; }
    .addBtn { background: #10a37f; color: white; border: none; padding: 12px; border-radius: 10px; font-weight: 700; cursor: pointer; grid-column: 1 / -1; }

    /* Car Cards */
    .carsGrid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 10px;
    }
    .carCard {
      background: #1e293b; border-radius: 15px; overflow: hidden; position: relative;
      animation: popIn 0.4s ease;
    }
    @keyframes popIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
    .carImg { width: 100%; height: 180px; object-fit: cover; }
    .carInfo { padding: 15px; }
    .deleteBtn {
      position: absolute; top: 10px; right: 10px; background: #ef4444; color: white;
      border: none; width: 30px; height: 30px; border-radius: 50%; cursor: pointer; font-size: 16px;
      z-index: 10;
    }
  </style>
</head>
<body>

  <div class="loginBox" id="loginBox">
    <div class="loginCard">
      <h2>🔐 Admin Panel</h2>
      <p style="color: #94a3b8; margin-top: 5px;">Only Authorized Access</p>
      <button class="googleBtn" onclick="adminLogin()">Continue With Google</button>
    </div>
  </div>

  <div id="mainApp" style="display:none;">
    <div class="header">
      <h2>🚗 QuickRide Admin</h2>
      <div class="userInfo">
        <img id="adminPhoto" src="" alt="Admin Profile">
        <div>
          <div id="adminName" style="font-size:14px; font-weight: 600;"></div>
          <button class="logoutBtn" onclick="adminLogout()">Logout</button>
        </div>
      </div>
    </div>

    <div class="statsRow">
      <div class="statCard">
        <h5>Total Bookings</h5>
        <p id="totalBookingsCount">0</p>
      </div>
      <div class="statCard" style="border-left-color: #007bff;">
        <h5>Total Registered Cars</h5>
        <p id="totalCarsCount">0</p>
      </div>
    </div>

    <div class="tabs">
      <button class="tabBtn active" onclick="openTab('bookings')">📋 All Bookings</button>
      <button class="tabBtn" onclick="openTab('cars')">🚗 Manage Cars</button>
    </div>

    <div class="tabContent active" id="bookings">
      <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;">
        <h3>All User Bookings</h3>
        <select id="bookingStatusFilter" class="filterSelect" onchange="loadAllBookings()">
          <option value="all">🔍 All Status</option>
          <option value="pending">⏳ Pending</option>
          <option value="confirmed">✅ Confirmed</option>
          <option value="cancelled">❌ Cancelled</option>
        </select>
      </div>
      
      <table style="width: 100%;">
        <thead>
          <tr>
            <th>User Name</th>
            <th>Phone</th>
            <th>Car Name</th>
            <th>Location</th>
            <th>Status</th>
            <th>Time</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="bookingsTable"></tbody>
      </table>
    </div>

    <div class="tabContent" id="cars">
      <h3>Add New Car</h3>
      <div class="addForm">
        <input type="text" id="carName" placeholder="Car Name">
        <input type="text" id="carNumber" placeholder="Car Number">
        <input type="number" id="carPrice" placeholder="Price per day">
        <input type="text" id="driverName" placeholder="Driver Name">
        <input type="text" id="driverPhone" placeholder="Driver Phone">
        <input type="number" id="carSeats" placeholder="Seats">
        <select id="carAC">
          <option value="AC">AC</option>
          <option value="Non-AC">Non-AC</option>
        </select>
        <input type="text" id="carFuel" placeholder="Fuel Type">
        <input type="number" id="carQuantity" placeholder="Quantity" value="1">
        <input type="text" id="carImage" placeholder="Image URL">
        <button class="addBtn" onclick="addCar()">Add Car</button>
      </div>
      
      <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; margin-top: 20px;">
        <h3>All Cars</h3>
        <input type="text" id="carSearchInput" class="searchBar" placeholder="🔎 Search car by name..." oninput="loadAllCars()">
      </div>
      <div class="carsGrid" id="carsGrid"></div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";
    import { getDatabase, ref, set, get, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBySOEfSbkpl4csyqckfX-kLeIoD-85VYs",
      authDomain: "my-friend-hub.firebaseapp.com",
      databaseURL: "https://my-friend-hub-default-rtdb.asia-southeast1.firebasestorage.com",
      projectId: "my-friend-hub",
      storageBucket: "my-friend-hub.firebasestorage.app",
      messagingSenderId: "1084141933087",
      appId: "1:1084141933087:web:1ae757acdd37a9c8427b2a"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    const adminEmails = ['khasbaskhalisa@gmail.com', 'joyrup@gmail.com'];

    // Admin Login
    window.adminLogin = async () => {
      try { 
        const provider = new GoogleAuthProvider();
        await signInWithPopup(auth, provider); 
      } catch (err) { 
        alert("Login Error: " + err.message); 
      }
    }

    // Logout
    window.adminLogout = () => { signOut(auth); }

    // Auth Check
    onAuthStateChanged(auth, async (user) => {
      if (user && adminEmails.includes(user.email)) {
        document.getElementById("loginBox").style.display = "none";
        document.getElementById("mainApp").style.display = "block";
        document.getElementById("adminName").textContent = user.displayName;
        document.getElementById("adminPhoto").src = user.photoURL || "https://via.placeholder.com/35";
        loadAllBookings();
        loadAllCars();
      } else if (user) {
        alert("Admin Access Only");
        signOut(auth);
      } else {
        document.getElementById("loginBox").style.display = "flex";
        document.getElementById("mainApp").style.display = "none";
      }
    });

    // Tab Switch
    window.openTab = (tabName) => {
      document.querySelectorAll('.tabBtn').forEach(btn => btn.classList.remove('active'));
      document.querySelectorAll('.tabContent').forEach(tab => tab.classList.remove('active'));
      event.target.classList.add('active');
      document.getElementById(tabName).classList.add('active');
    }

    // Load All Bookings + Filter Logic
    function loadAllBookings() {
      const selectedFilter = document.getElementById("bookingStatusFilter").value;

      onValue(ref(db, 'bookings'), async (snap) => {
        const tbody = document.getElementById("bookingsTable");
        tbody.innerHTML = "";
        const bookings = snap.val() || {};
        
        // Live Stat Counter Update
        document.getElementById("totalBookingsCount").textContent = Object.keys(bookings).length;
        
        for (const [key, booking] of Object.entries(bookings)) {
          // Filter Condition
          if (selectedFilter !== "all" && booking.status !== selectedFilter) continue;

          const userSnap = await get(ref(db, 'users/' + booking.userId));
          const userData = userSnap.val() || {};
          const userName = userData.name || 'Unknown User';
          const userPhone = userData.phone || 'N/A';
          
          tbody.innerHTML += `
            <tr>
              <td>${userName}</td>
              <td>${userPhone}</td>
              <td>${booking.carName || 'N/A'}</td>
              <td>📍 ${booking.pickupLocation || 'N/A'} → ${booking.dropLocation || 'N/A'}</td>
              <td><span class="status ${booking.status}">${booking.status ? booking.status.toUpperCase() : 'PENDING'}</span></td>
              <td>${booking.timestamp ? new Date(booking.timestamp).toLocaleString() : 'N/A'}</td>
              <td>
                ${booking.status === 'pending' ? `
                  <button class="actionBtn confirmBtn" onclick="updateBooking('${key}', 'confirmed')">Confirm</button>
                  <button class="actionBtn cancelBtn" onclick="updateBooking('${key}', 'cancelled')">Cancel</button>
                ` : '-'}
              </td>
            </tr>
          `;
        }
      });
    }

    // Update Booking Status
    window.updateBooking = async (bookingId, status) => {
      try {
        await update(ref(db, 'bookings/' + bookingId), { status: status });
        alert(`Booking ${status}!`);
      } catch (err) {
        alert("Permission Denied: " + err.message);
      }
    }

    // Add Car
    window.addCar = async () => {
      const carData = {
        name: document.getElementById("carName").value,
        number: document.getElementById("carNumber").value,
        price: Number(document.getElementById("carPrice").value),
        driverName: document.getElementById("driverName").value,
        driverPhone: document.getElementById("driverPhone").value,
        seats: Number(document.getElementById("carSeats").value),
        ac: document.getElementById("carAC").value === "AC",
        fuel: document.getElementById("carFuel").value,
        quantity: Number(document.getElementById("carQuantity").value),
        image: document.getElementById("carImage").value
      };
      
      if (!carData.name || !carData.number || !carData.price || !carData.driverName || !carData.image) {
        return alert("সব Field ঠিকঠাক পূরণ কর!");
      }
      
      try {
        await push(ref(db, 'cars'), carData);
        alert("Car Added Successfully!");
        document.querySelectorAll('.addForm input').forEach(inp => inp.value = '');
      } catch (err) {
        alert("Database error: " + err.message);
      }
    }

    // Load All Cars + Search Filter Logic
    function loadAllCars() {
      const searchKeyword = document.getElementById("carSearchInput").value.toLowerCase();

      onValue(ref(db, 'cars'), (snap) => {
        const grid = document.getElementById("carsGrid");
        grid.innerHTML = "";
        
        // Live Stat Counter Update
        document.getElementById("totalCarsCount").textContent = snap.numChildren();

        snap.forEach((child) => {
          const car = child.val();
          
          // Search Condition
          if (searchKeyword && !car.name.toLowerCase().includes(searchKeyword)) return;

          grid.innerHTML += `
            <div class="carCard">
              <button class="deleteBtn" onclick="deleteCar('${child.key}')">×</button>
              <img src="${car.image || 'https://via.placeholder.com/280x180'}" class="carImg">
              <div class="carInfo">
                <h4>${car.name}</h4>
                <p>₹${car.price}/day | ${car.seats} Seats</p>
                <p>Qty: ${car.quantity} | ${car.ac ? 'AC' : 'Non-AC'}</p>
              </div>
            </div>
          `;
        });
      });
    }

    // Delete Car
    window.deleteCar = async (carId) => {
      if (confirm("Delete করবি?")) {
        try {
          await remove(ref(db, 'cars/' + carId));
          alert("Deleted!");
        } catch (err) {
          alert("Error deleting car: " + err.message);
        }
      }
    }
  </script>
</body>
</html>
