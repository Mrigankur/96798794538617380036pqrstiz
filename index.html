<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Quick Ride - System Control</title>

<!-- Firebase SDK Compat Version -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#020617;color:#f1f5f9;padding:1rem;min-height:100vh}
.login-box{max-width:420px;margin:12vh auto;background:rgba(255,255,255,0.05);padding:2.5rem;border-radius:20px;border:1px solid rgba(255,255,255,0.1);backdrop-filter:blur(12px)}
.login-box h2{text-align:center;margin-bottom:1.5rem;color:#2dd4bf}
.dashboard{display:none;max-width:1300px;margin:0 auto}
input,textarea,select{width:100%;padding:0.9rem;margin:0.6rem 0;background:#1e293b;border:1px solid rgba(255,255,255,0.1);border-radius:10px;color:#f1f5f9;outline:none;font-size:1rem}
input:focus,textarea:focus{border-color:#10a37f;box-shadow:0 0 0 3px rgba(16,163,127,0.1)}
.btn{background:linear-gradient(135deg,#10a37f,#2dd4bf);color:white;padding:0.8rem 1.6rem;border:none;border-radius:10px;cursor:pointer;font-weight:600;margin:0.5rem 0.3rem;transition:0.3s}
.btn:hover{transform:translateY(-2px);box-shadow:0 5px 15px rgba(16,163,127,0.4)}
.btn-sm{padding:0.4rem 0.8rem;font-size:0.9rem}
.btn-danger{background:linear-gradient(135deg,#ef4444,#f87171)}
.nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:2rem;padding:1rem;background:rgba(255,255,255,0.05);border-radius:12px}
.card{background:rgba(255,255,255,0.05);padding:1.5rem;border-radius:12px;margin:1rem 0;border:1px solid rgba(255,255,255,0.1)}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:1rem;margin:2rem 0}
table{width:100%;border-collapse:collapse;margin-top:1rem}
th,td{padding:12px;text-align:left;border-bottom:1px solid rgba(255,255,255,0.1)}
th{background:rgba(16,163,127,0.2);color:#2dd4bf}
.status{padding:4px 10px;border-radius:20px;font-size:12px}
.active{background:#166534;color:#dcfce7}
.banned{background:#991b1b;color:#fee2e2}
.error{color:#ef4444;text-align:center;margin-top:1rem;display:none}
.tabs{display:flex;gap:1rem;margin-bottom:1.5rem;flex-wrap:wrap}
.tab{padding:0.7rem 1.2rem;background:rgba(255,255,255,0.05);border-radius:8px;cursor:pointer}
.tab.active{background:#10a37f}
.hidden{display:none}
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);display:none;justify-content:center;align-items:center;z-index:100}
.modal-content{background:#1e293b;padding:2rem;border-radius:12px;width:90%;max-width:500px}
.loading{text-align:center;padding:2rem;color:#64748b}
</style>
</head>
<body>

<!-- Login Section -->
<div class="login-box" id="loginBox">
  <h2>🔐 Quick Ride Admin</h2>
  <input type="email" id="email" placeholder="khasbaskhalisa@gmail.com" autocomplete="off">
  <input type="password" id="password" placeholder="Password">
  <button class="btn" style="width:100%" onclick="login()">Login to Panel</button>
  <p class="error" id="errorMsg">Invalid credentials</p>
</div>

<!-- Dashboard Section -->
<div class="dashboard" id="dashboard">
  <div class="nav">
    <h2>🚗 Quick Ride Control Panel</h2>
    <div>
      <span id="adminEmail" style="margin-right:1rem;color:#2dd4bf"></span>
      <button class="btn" onclick="logout()">Logout</button>
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="showTab('cars')">Cars</div>
    <div class="tab" onclick="showTab('users')">Users</div>
    <div class="tab" onclick="showTab('stats')">Stats</div>
  </div>

  <!-- Cars Tab -->
  <div id="carsTab">
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <h3>All Cars</h3>
        <button class="btn btn-sm" onclick="openAddCarModal()">+ Add Car</button>
      </div>
      <div id="carsLoading" class="loading">Loading cars...</div>
      <table id="carsTable" style="display:none">
        <thead>
          <tr>
            <th>Car Name</th>
            <th>Number</th>
            <th>Type</th>
            <th>Driver</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="carsBody"></tbody>
      </table>
    </div>
  </div>

  <!-- Users Tab -->
  <div id="usersTab" class="hidden">
    <div class="card">
      <h3>All Users</h3>
      <p style="color:#64748b;margin-top:1rem">Users data এর জন্য Firebase rules এ 'users' node add কর</p>
    </div>
  </div>

  <!-- Stats Tab -->
  <div id="statsTab" class="hidden">
    <div class="stats">
      <div class="card"><h3>Total Cars</h3><p style="font-size:2rem" id="totalCars">0</p></div>
      <div class="card"><h3>Database</h3><p style="font-size:1rem">asia-southeast1</p></div>
    </div>
  </div>
</div>

<!-- Add Car Modal -->
<div class="modal" id="addCarModal">
  <div class="modal-content">
    <h3 style="margin-bottom:1rem">Add New Car</h3>
    <input type="text" id="carName" placeholder="Car Name - Swift Dzire">
    <input type="text" id="carNumber" placeholder="Car Number - WB 01 AB 1234">
    <select id="carType">
      <option value="Sedan">Sedan</option>
      <option value="SUV">SUV</option>
      <option value="Hatchback">Hatchback</option>
      <option value="Auto">Auto</option>
    </select>
    <input type="text" id="driverName" placeholder="Driver Name">
    <button class="btn" onclick="addCar()">Save Car</button>
    <button class="btn btn-danger" onclick="closeAddCarModal()">Cancel</button>
  </div>
</div>

<script>
// ===== তোর Firebase Config =====
const firebaseConfig = {
  apiKey: "AIzaSyBySOEfSbkpl4csyqckfX-kLeIoD-85VYs",
  authDomain: "my-friend-hub.firebaseapp.com",
  databaseURL: "https://my-friend-hub-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "my-friend-hub",
  storageBucket: "my-friend-hub.firebasestorage.app",
  messagingSenderId: "1084141933087",
  appId: "1:1084141933087:web:4fc11e621846e16c427b2a",
  measurementId: "G-ZSC22NX41Z"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

// ===== AUTH =====
function login() {
  const email = document.getElementById('email').value;
  const pass = document.getElementById('password').value;
  const error = document.getElementById('errorMsg');

  auth.signInWithEmailAndPassword(email, pass)
  .then(() => {
      document.getElementById('loginBox').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      document.getElementById('adminEmail').innerText = email;
      loadCars();
    })
  .catch((err) => {
      error.style.display = 'block';
      error.innerText = err.message;
      setTimeout(() => error.style.display = 'none', 3000);
    });
}

function logout() {
  auth.signOut();
  document.getElementById('loginBox').style.display = 'block';
  document.getElementById('dashboard').style.display = 'none';
}

auth.onAuthStateChanged(user => {
  if (user) {
    document.getElementById('loginBox').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    document.getElementById('adminEmail').innerText = user.email;
    loadCars();
  }
});

// ===== CARS CRUD =====
function loadCars() {
  db.ref('cars').on('value', (snapshot) => {
    const cars = snapshot.val();
    const tbody = document.getElementById('carsBody');
    const loading = document.getElementById('carsLoading');
    const table = document.getElementById('carsTable');

    tbody.innerHTML = '';
    let count = 0;

    if(cars) {
      Object.keys(cars).forEach(key => {
        const car = cars[key];
        count++;
        tbody.innerHTML += `
          <tr>
            <td>${car.name}</td>
            <td>${car.number}</td>
            <td>${car.type}</td>
            <td>${car.driver}</td>
            <td>
              <button class="btn btn-sm btn-danger" onclick="deleteCar('${key}')">Delete</button>
            </td>
          </tr>
        `;
      });
    }

    document.getElementById('totalCars').innerText = count;
    loading.style.display = 'none';
    table.style.display = 'table';

    if(count === 0) {
      tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:#64748b">No cars found. Add কর</td></tr>';
    }
  });
}

function openAddCarModal() {
  if(auth.currentUser?.email!== 'khasbaskhalisa@gmail.com') {
    alert('Permission নাই! শুধু khasbaskhalisa@gmail.com car add করতে পারবে');
    return;
  }
  document.getElementById('addCarModal').style.display = 'flex';
}

function closeAddCarModal() {
  document.getElementById('addCarModal').style.display = 'none';
}

function addCar() {
  const carData = {
    name: document.getElementById('carName').value,
    number: document.getElementById('carNumber').value,
    type: document.getElementById('carType').value,
    driver: document.getElementById('driverName').value,
    createdAt: Date.now(),
    addedBy: auth.currentUser.email
  };

  if(!carData.name ||!carData.number) {
    alert('Car name আর number লাগবে');
    return;
  }

  db.ref('cars').push(carData)
  .then(() => {
      closeAddCarModal();
      document.getElementById('carName').value = '';
      document.getElementById('carNumber').value = '';
      document.getElementById('driverName').value = '';
    })
  .catch(err => alert('Error: ' + err.message));
}

function deleteCar(carId) {
  if(auth.currentUser?.email!== 'khasbaskhalisa@gmail.com') {
    alert('Permission নাই!');
    return;
  }
  if(confirm('Car টা delete করবি?')) {
    db.ref('cars/' + carId).remove();
  }
}

function showTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');

  document.getElementById('carsTab').classList.add('hidden');
  document.getElementById('usersTab').classList.add('hidden');
  document.getElementById('statsTab').classList.add('hidden');
  document.getElementById(tab + 'Tab').classList.remove('hidden');
}
</script>
</body>
</html>
